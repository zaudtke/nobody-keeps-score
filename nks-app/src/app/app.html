@if (updateAvailable()) {
  <div
    class="fixed top-0 inset-x-0 z-[9999] flex items-center justify-between
           gap-3 px-4 py-2.5
           bg-felt-600 text-white text-[0.82rem] font-medium shadow-lg"
  >
    <span>Update available</span>
    <button
      (click)="applyUpdate()"
      class="shrink-0 px-3 py-1 rounded-full bg-white text-felt-700
             font-semibold text-[0.78rem] cursor-pointer"
    >
      Refresh
    </button>
  </div>
}

<router-outlet />
